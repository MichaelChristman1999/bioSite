  <h1>Ryan's Hobbies</h1>
<p>In his spare time, Ryan is an avid gamer, comic book collector, and he also loves taking his dog, Santo, on walks. He became fascinated with computers at a very young age (when he was roughly four years old). Since then, Ryan kept learning about computer systems, web applications, and software (and how they operate). He has gradually accumulated hundreds of video games and thousands of comics over the years as hobbies (which is still continually expanding). However, it didn’t make him lose track of his career ambitions. As a matter of fact, his enthusiasm for console and PC games is mainly what inspired him to follow his dream to become a web app and software developer in the first place. Ryan attributes his longtime hobbies and supportive peer group in shaping him into the successful, independent, and determined individual he is today.</p><p>Although he is exceptionally committed in pursuing his life passions and aspirations, he truly values family more than anything else as he also enjoys spending copious hours with his parents and pet dog. He has applied various skills he’s learned in web programming to certain personal endeavors, such as designing his own PC and organizing lists of games he’s completed using databases. Additional activities Ryan loves devoting his time to include hiking and kayaking with his girlfriend, Lynnsey. They enjoy hiking on local grounds, state, and national parks. He goes kayaking, maybe once a year, but wishes he’d get the opportunity to do it more often. Ryan and Lynnsey have been together for a couple of years and also like to go on relaxing vacations across the country. They both love to explore nature and hope to travel more frequently in the future. </p>
